services:
  db:
    image: postgres:18-alpine
    container_name: omnifit_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 7Er2zgu526lCAN9
      POSTGRES_DB: omnifit
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
    container_name: omnifit_api
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Host=db;Port=5432;Database=omnifit;Username=postgres;Password=7Er2zgu526lCAN9
    ports:
      - "7223:8080"
    depends_on:
      - db

  frontend:
    build:
      context: ./frontend
    container_name: omnifit_web
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  postgres_data:
